<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">AI retrofit versus AI-native redesign</title>
  <desc id="desc">A side-by-side schematic contrasting AI inserted into an old workflow with AI-native redesigned workflow.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}
      .title{font-family:Inter,Arial,sans-serif;font-size:30px;font-weight:700;fill:#0f172a}
      .label{font-family:Inter,Arial,sans-serif;font-size:18px;fill:#334155}
      .small{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#475569}
      .step{fill:#e2e8f0;stroke:#64748b;stroke-width:2}
      .ai{fill:#ede9fe;stroke:#7c3aed;stroke-width:3}
      .native{fill:#ccfbf1;stroke:#0f766e;stroke-width:3}
      .line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <rect class="panel" x="35" y="45" width="535" height="470" rx="8"/>
  <rect class="panel" x="630" y="45" width="535" height="470" rx="8"/>
  <text class="title" x="70" y="92">AI as group drive</text>
  <text class="small" x="70" y="122">assistant bolted onto an old workflow</text>
  <text class="title" x="665" y="92">AI as unit drive</text>
  <text class="small" x="665" y="122">workflow redesigned around AI capabilities</text>

  <!-- old workflow -->
  <rect class="step" x="75" y="220" width="105" height="58" rx="8"/><text class="label" x="105" y="255">Plan</text>
  <rect class="step" x="215" y="220" width="105" height="58" rx="8"/><text class="label" x="243" y="255">Draft</text>
  <rect class="step" x="355" y="220" width="105" height="58" rx="8"/><text class="label" x="382" y="255">Review</text>
  <path class="line" d="M180 249H214"/><path class="line" d="M320 249H354"/>
  <rect class="ai" x="230" y="345" width="190" height="70" rx="12"/>
  <text class="label" x="276" y="374">LLM helper</text>
  <text class="small" x="263" y="399">optional overlay</text>
  <path d="M325 345 C320 320 285 296 270 278" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text class="small" x="70" y="470">Useful locally, but old handoffs and review gates remain.</text>

  <!-- redesigned workflow -->
  <rect class="native" x="675" y="165" width="140" height="58" rx="8"/><text class="label" x="704" y="200">Task split</text>
  <rect class="native" x="880" y="165" width="140" height="58" rx="8"/><text class="label" x="912" y="200">Tools/API</text>
  <rect class="native" x="675" y="300" width="140" height="58" rx="8"/><text class="label" x="718" y="335">Evals</text>
  <rect class="native" x="880" y="300" width="140" height="58" rx="8"/><text class="label" x="902" y="335">Human gate</text>
  <rect class="ai" x="790" y="235" width="120" height="65" rx="12"/>
  <text class="label" x="823" y="263">AI</text>
  <text class="small" x="807" y="286">worker loop</text>
  <path class="line" d="M815 195 C845 195 850 225 850 235"/>
  <path class="line" d="M910 195 C880 195 852 220 850 235"/>
  <path class="line" d="M850 300 C835 324 815 329 815 329"/>
  <path class="line" d="M910 329 C880 329 860 307 850 300"/>
  <text class="small" x="665" y="470">The system changes: data flow, authority, evaluation, and responsibility.</text>
</svg>
