<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Diffusion lag across three general-purpose technologies</title>
  <desc id="desc">Three small-multiple charts: electrification, computers, and AI. Each shows an adoption curve rising well after the enabling invention, with the productivity payoff arriving later still. For AI the payoff is still unconfirmed as of 2026.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}
      .axis{stroke:#334155;stroke-width:1.5}
      .ref{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:5 6}
      .line{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .pre{stroke:#94a3b8;stroke-width:3;fill:none;stroke-dasharray:2 8;stroke-linecap:round}
      .invent{stroke:#b45309;stroke-width:2;stroke-dasharray:6 5}
      .h1{font-family:Inter,Arial,sans-serif;font-size:28px;font-weight:700;fill:#0f172a}
      .h2{font-family:Inter,Arial,sans-serif;font-size:20px;font-weight:700;fill:#0f172a}
      .metric{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#475569}
      .small{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#475569}
      .warn{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:700;fill:#b45309}
      .pay{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:700;fill:#0f766e}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="h1" x="40" y="44">The lag, three times: adoption races ahead of the payoff</text>
  <text class="small" x="40" y="68" font-size="14">Different metrics — aligned only by the shape. Each curve rises long after the invention; the payoff comes later still.</text>

  <!-- ============ PANEL 1: ELECTRICITY ============ -->
  <rect class="panel" x="20" y="88" width="375" height="418" rx="8"/>
  <text class="h2" x="40" y="120">Electrification</text>
  <text class="metric" x="40" y="142">% of U.S. factory drive electrified</text>
  <!-- ref + axes -->
  <line class="ref" x1="60" y1="330" x2="375" y2="330"/>
  <text class="small" x="34" y="334">50%</text>
  <text class="small" x="40" y="434">0%</text>
  <line class="axis" x1="60" y1="430" x2="378" y2="430"/>
  <!-- payoff band 1920s -->
  <rect x="312" y="230" width="56.7" height="200" fill="#ecfdf5" stroke="#99f6e4"/>
  <text class="pay" x="300" y="250">1920s</text>
  <text class="pay" x="298" y="266">payoff</text>
  <!-- invention -->
  <line class="invent" x1="72.6" y1="230" x2="72.6" y2="430"/>
  <text class="warn" x="64" y="224">1879 / 1882</text>
  <!-- pre + curve -->
  <path class="pre" d="M72.6,426 L179.7,422"/>
  <polyline class="line" points="179.7,422 242.7,380 305.7,330 368.7,280"/>
  <!-- x ticks -->
  <text class="small" x="55" y="448">1880</text>
  <text class="small" x="168" y="448">1900</text>
  <text class="small" x="294" y="448">1920</text>
  <text class="small" x="40" y="486" font-size="13" fill="#334155">&lt;5% in 1899 → ~50% by ~1919 →</text>
  <text class="small" x="40" y="502" font-size="13" fill="#334155">payoff in the 1920s. Lag ≈ 4 decades.</text>

  <!-- ============ PANEL 2: COMPUTERS ============ -->
  <rect class="panel" x="405" y="88" width="390" height="418" rx="8"/>
  <text class="h2" x="425" y="120">Computers / IT</text>
  <text class="metric" x="425" y="142">% of U.S. households with a computer</text>
  <line class="ref" x1="445" y1="330" x2="780" y2="330"/>
  <text class="small" x="419" y="334">50%</text>
  <text class="small" x="425" y="434">0%</text>
  <line class="axis" x1="445" y1="430" x2="783" y2="430"/>
  <!-- payoff band 1995-2004 -->
  <rect x="646" y="230" width="75.4" height="200" fill="#ecfdf5" stroke="#99f6e4"/>
  <text class="pay" x="636" y="250">1995–</text>
  <text class="pay" x="636" y="266">2004</text>
  <!-- invention + trigger -->
  <line class="invent" x1="445" y1="230" x2="445" y2="430"/>
  <text class="warn" x="448" y="224">1971 µP</text>
  <line class="invent" x1="528" y1="250" x2="528" y2="430"/>
  <text class="small" x="510" y="244" fill="#b45309">1981 PC</text>
  <!-- pre + curve -->
  <path class="pre" d="M445,430 L553.9,414"/>
  <polyline class="line" points="553.9,414 662.75,356 687.9,328 771.6,276"/>
  <text class="small" x="440" y="448">1971</text>
  <text class="small" x="632" y="448">1995</text>
  <text class="small" x="760" y="448">2010</text>
  <text class="small" x="425" y="486" font-size="13" fill="#334155">8% of homes in 1984 → ~50% by 2000.</text>
  <text class="small" x="425" y="502" font-size="13" fill="#334155">Payoff 1995–2004, then slowdown.</text>

  <!-- ============ PANEL 3: AI ============ -->
  <rect class="panel" x="805" y="88" width="375" height="418" rx="8"/>
  <text class="h2" x="825" y="120">AI / LLMs</text>
  <text class="metric" x="825" y="142">% of U.S. workers using genAI at work</text>
  <line class="ref" x1="845" y1="330" x2="1165" y2="330"/>
  <text class="small" x="819" y="334">50%</text>
  <text class="small" x="825" y="434">0%</text>
  <line class="axis" x1="845" y1="430" x2="1168" y2="430"/>
  <!-- payoff unknown -->
  <rect x="1095" y="250" width="78" height="86" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="5 5"/>
  <text x="1126" y="298" font-family="Inter,Arial,sans-serif" font-size="34px" font-weight="800" fill="#94a3b8">?</text>
  <text class="small" x="1086" y="324">payoff: none</text>
  <!-- inventions -->
  <line class="invent" x1="951.7" y1="260" x2="951.7" y2="430"/>
  <text class="small" x="918" y="254" fill="#b45309">2017 Transf.</text>
  <line class="invent" x1="1058.3" y1="230" x2="1058.3" y2="430"/>
  <text class="warn" x="1012" y="224">2022 ChatGPT</text>
  <!-- curve (steep, recent) -->
  <polyline class="line" points="1058.3,430 1101,374 1122.3,356 1143.6,348"/>
  <text class="small" x="840" y="448">2012</text>
  <text class="small" x="1042" y="448">2022</text>
  <text class="small" x="1148" y="448">2026</text>
  <text class="small" x="825" y="486" font-size="13" fill="#334155">~28% of workers by 2024, ~37% by 2025 —</text>
  <text class="small" x="825" y="502" font-size="13" fill="#334155">faster than PC; payoff still unconfirmed.</text>

  <!-- footnote -->
  <text class="small" x="40" y="535">Metrics differ (factory horsepower · households · workers); curves are not on one scale. The shape is the point: adoption first, payoff later — AI's payoff box is still empty.</text>
</svg>
