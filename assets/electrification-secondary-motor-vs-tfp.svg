<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
<title id="title">Factory electrification, secondary motors, and manufacturing TFP growth</title>
<desc id="desc">Line chart comparing factory drive electrified, secondary motor penetration, and manufacturing TFP growth.</desc>
<style>.bg{fill:#f8fafc}.grid{stroke:#d7e1ec;stroke-width:1}.axisline{stroke:#64748b;stroke-width:1.2}.axis{font-family:Inter,system-ui,sans-serif;font-size:12px;fill:#475569}.title{font-family:Inter,system-ui,sans-serif;font-size:21px;font-weight:800;fill:#0f172a}.subtitle{font-family:Inter,system-ui,sans-serif;font-size:12px;fill:#475569}.label{font-family:Inter,system-ui,sans-serif;font-size:12px;font-weight:800;fill:#0f172a}.small{font-family:Inter,system-ui,sans-serif;font-size:10.5px;fill:#475569}.bar{fill:#94a3b8;opacity:.8}.bar.early{fill:#64748b;opacity:.9}.bar.hot{fill:#0f766e;opacity:.95}.barlabel{font-family:Inter,system-ui,sans-serif;font-size:11px;font-weight:800;fill:#0f172a}.period{font-family:Inter,system-ui,sans-serif;font-size:9.5px;fill:#475569}.line1{fill:none;stroke:#0f766e;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}.line2{fill:none;stroke:#c2410c;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}.dot1{fill:#0f766e}.dot2{fill:#c2410c}.shade{fill:#d1fae5;opacity:.48}.note{fill:#fff7ed;stroke:#fdba74;stroke-width:1}.note2{fill:#ecfdf5;stroke:#5eead4;stroke-width:1}</style>
