<text x="938" y="91.0" class="axis">6%</text><line x1="72" y1="86" x2="72" y2="464" class="axisline"/><line x1="928" y1="86" x2="928" y2="464" class="axisline"/><line x1="72" y1="464" x2="928" y2="464" class="axisline"/><text x="72.0" y="489" class="axis" text-anchor="middle">1869</text>
<text x="214.7" y="489" class="axis" text-anchor="middle">1879</text>
