<rect x="90" y="101" width="245" height="54" rx="7" class="note"/><text x="103" y="122" class="label">1880s TFP growth exists</text><text x="103" y="139" class="small">but factory electrification is ~0.3% in 1889,</text><text x="103" y="153" class="small">so this is not electricity-specific payoff.</text>
<rect x="598" y="101" width="315" height="68" rx="7" class="note2"/><text x="611" y="122" class="label">1920s: diffusion + mechanism + TFP surge</text><text x="611" y="139" class="small">factory drive: 53% → 78%; secondary: 33% → 56%</text><text x="611" y="153" class="small">David links about half of the acceleration statistically.</text>
<g transform="translate(90,538)"><line x1="0" y1="0" x2="28" y2="0" class="line1"/><text x="36" y="4" class="small">Factory drive electrified</text><line x1="205" y1="0" x2="233" y2="0" class="line2"/><text x="241" y="4" class="small">Secondary motor penetration</text><rect x="430" y="-8" width="16" height="12" class="bar hot"/><text x="455" y="4" class="small">TFP growth bar</text></g>
</svg>