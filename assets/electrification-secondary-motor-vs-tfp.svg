<text x="72" y="34" class="title">Factory electrification lines up with the 1920s, not the 1880s</text>
<text x="72" y="54" class="subtitle">Lines = electrification diffusion (left axis). Bars = manufacturing TFP growth, %/yr (right axis).</text>
<text x="72" y="76" class="axis">Left: diffusion share</text><text x="928" y="76" class="axis" text-anchor="end">Right: TFP growth</text>
