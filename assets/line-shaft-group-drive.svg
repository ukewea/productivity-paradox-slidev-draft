<line x1="552" y1="272" x2="504" y2="280" mask="url(#imagine-text-gaps-dq7uhq)" stroke="#73726c" stroke-width="0.5" stroke-dasharray="4 3" fill="none"/>
<circle cx="504" cy="280" r="2" fill="#73726c"/>
<text x="556" y="270" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#141413">Machine</text>
<text x="556" y="286" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d3d3a">lathe, drill…</text>

<text x="94" y="338" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#141413">Electric motor</text>
<text x="94" y="354" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d3d3a">drives the group</text>
