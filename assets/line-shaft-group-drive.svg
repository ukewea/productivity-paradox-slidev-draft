<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How a line-shaft (group drive) factory delivers power</title>
<desc>One electric motor turns a long overhead line shaft via a belt; pulleys on the shaft drop leather belts down to each machine on the floor, so a single motor drives a whole group of machines.</desc>
